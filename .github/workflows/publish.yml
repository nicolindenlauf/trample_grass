name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  curseforge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check tag matches mod version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          mod_version="$(sed -n 's/^mod_version=//p' gradle.properties)"
          test "${tag_version}" = "${mod_version}" || (echo "Tag v${tag_version} does not match mod_version=${mod_version}." && exit 1)

      - name: Build with Gradle
        run: ./gradlew build

      - name: Check publishing configuration
        run: |
          test -n "${CURSEFORGE_TOKEN}" || (echo "Set repository secret CURSEFORGE_TOKEN." && exit 1)
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}

      - name: Publish to CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1544282
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: build/libs/!(*-@(sources|javadoc|dev)).jar
          version-type: release
          loaders: neoforge
          game-versions: '1.21.1'
          java: 'Java 21'
          retry-attempts: 2
